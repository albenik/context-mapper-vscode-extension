name: Build

on:
  push:
    branches:
      - master
    tags-ignore: 
      - 'v*'
  pull_request:

jobs:
  build:
    if: contains(github.event.head_commit.message, 'Release v') == false
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install Dependencies
      run: sudo apt-get -y install libsecret-1-dev
    - name: Gradle caches  
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      uses: GabrielBB/xvfb-action@v1.6
      with:
        run: ./gradlew clean snapshot vscodeExtension
      env:
        MS_MARKETPLACE_ACCESS_TOKEN: ${{ secrets.MS_MARKETPLACE_ACCESS_TOKEN }}
        OPENVSX_ACCESS_TOKEN: ${{ secrets.OPENVSX_ACCESS_TOKEN }}
